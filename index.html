<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noor Alam Date Tracker & Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f4f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 20px;
            color: #2d4030;
        }

        .header-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-bottom: 25px;
            margin-top: 10px;
            width: 100%;
        }

        .text-logo {
            width: 75px;
            height: 75px;
            background: #0b3c26;
            color: #ffffff;
            font-size: 46px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            margin-bottom: 15px;
            box-shadow: 0px 5px 15px rgba(11, 60, 38, 0.25);
        }

        .title {
            font-size: 24px;
            color: #0b3c26;
            font-weight: 700;
        }

        .subtitle {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }

        .card {
            background: #f0f4f8;
            border-radius: 25px;
            box-shadow: 9px 9px 16px #d1d9e6, -9px -9px 16px #ffffff;
            width: 100%;
            max-width: 380px;
            padding: 25px;
            margin-bottom: 25px;
            position: relative;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 16px;
            color: #333;
            margin-bottom: 20px;
        }

        .icon-box {
            background: #ffffff;
            padding: 8px 12px;
            border-radius: 10px;
            box-shadow: 3px 3px 6px #d1d9e6, -3px -3px 6px #ffffff;
            font-weight: bold;
        }

        .live-info-line1 {
            font-size: 18px;
            font-weight: 600;
            color: #1a3020;
            margin-bottom: 8px;
        }

        .live-info-line2 {
            font-size: 26px;
            font-weight: 700;
            color: #2b5c43;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }

        .num-input {
            width: 100%;
            background: #f0f4f8;
            border: none;
            border-bottom: 2px solid #d1d9e6;
            padding: 10px 80px 10px 5px;
            font-size: 17px;
            color: #333;
            outline: none;
            transition: border-color 0.3s;
        }

        .num-input:focus {
            border-bottom-color: #2b5c43;
        }

        .action-buttons {
            position: absolute;
            right: 0;
            top: 5px;
            display: flex;
            gap: 8px;
        }

        .btn-mini {
            background: #f0f4f8;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            box-shadow: 3px 3px 6px #d1d9e6, -3px -3px 6px #ffffff;
            cursor: pointer;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-mini:active {
            box-shadow: inset 2px 2px 5px #d1d9e6, inset -2px -2px 5px #ffffff;
        }

        /* IRCTC Middle Exchange Button Row */
        .middle-divider-row {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 15px 0;
            position: relative;
        }

        .arrow-divider-line {
            color: #d1d9e6;
            font-size: 14px;
            display: flex;
            gap: 25px;
        }

        .btn-exchange-mid {
            position: absolute;
            background: #f0f4f8;
            color: #2b5c43;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            box-shadow: 3px 3px 6px #d1d9e6, -3px -3px 6px #ffffff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            font-weight: bold;
            transition: transform 0.3s ease;
        }

        .btn-exchange-mid:active {
            box-shadow: inset 2px 2px 5px #d1d9e6, inset -2px -2px 5px #ffffff;
        }

        .rotate-effect {
            transform: rotate(180deg);
        }

        .result-display {
            font-size: 19px;
            font-weight: 600;
            color: #1a3020;
            min-height: 40px;
            padding-top: 10px;
            border-bottom: 2px solid #2b5c43;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .copy-btn {
            background: transparent;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 18px;
        }

        /* Notepad Section Styles */
        .notepad-textarea {
            width: 100%;
            height: 120px;
            background: #f0f4f8;
            border: 1px solid #d1d9e6;
            border-radius: 15px;
            padding: 12px;
            font-size: 15px;
            color: #333;
            resize: none;
            outline: none;
            box-shadow: inset 2px 2px 5px #d1d9e6, inset -2px -2px 5px #ffffff;
            margin-bottom: 15px;
        }

        .btn-wide {
            width: 100%;
            background: #0b3c26;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            box-shadow: 3px 3px 6px #d1d9e6;
            transition: background 0.2s;
        }

        .btn-wide:active {
            background: #072719;
        }

        /* Calculator Styles */
        .calc-screen {
            width: 100%;
            height: 50px;
            background: #f0f4f8;
            border-radius: 12px;
            box-shadow: inset 2px 2px 5px #d1d9e6, inset -2px -2px 5px #ffffff;
            border: none;
            text-align: right;
            padding: 10px;
            font-size: 20px;
            color: #2d4030;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .btn-calc {
            background: #f0f4f8;
            border: none;
            padding: 15px 0;
            font-size: 18px;
            font-weight: 600;
            color: #333;
            border-radius: 12px;
            box-shadow: 3px 3px 6px #d1d9e6, -3px -3px 6px #ffffff;
            cursor: pointer;
        }

        .btn-calc:active {
            box-shadow: inset 2px 2px 5px #d1d9e6, inset -2px -2px 5px #ffffff;
        }

        .btn-op {
            color: #2b5c43;
            background: #e6edf5;
        }

        .footer-text {
            font-size: 12px;
            font-weight: 700;
            color: #4a6355;
            letter-spacing: 1px;
            margin-top: 10px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* Native Date Picker Hidden Trigger */
        .hidden-date-picker {
            position: absolute;
            right: 40px;
            top: 5px;
            width: 32px;
            height: 32px;
            opacity: 0;
            cursor: pointer;
            z-index: 10;
        }
    </style>
</head>
<body>

    <!-- Header Section -->
    <div class="header-section">
        <div class="text-logo">C</div>
        <div class="title">Noor Alam 2.06.13123.044</div>
        <div class="subtitle">🌹 #43615.012</div>
    </div>

    <!-- Top Card: Live Calendar & Time -->
    <div class="card">
        <div class="card-header">
            <div class="icon-box"><i class="fa-solid fa-calendar-days"></i></div>
            <span>Today's Calendar</span>
        </div>
        <div class="live-info-line1" id="live-date-info">Loading...</div>
        <div class="live-info-line2" id="live-time">00:00:00 AM</div>
    </div>

    <!-- Middle Card: Smart Date Calculator -->
    <div class="card">
        <div class="card-header">
            <div class="icon-box"><i class="fa-solid fa-calculator"></i></div>
            <span id="card-mode-title">Find Date (e.g., +5 or -4)</span>
        </div>

        <div class="input-wrapper">
            <!-- Universal Text Input for Hybrid Use -->
            <input type="text" id="day-input" class="num-input" placeholder="Type number with + or - ...">
            
            <!-- Hidden native input triggered by calendar button -->
            <input type="date" id="native-date-trigger" class="hidden-date-picker" onchange="handleDateSelect(this.value)">

            <div class="action-buttons">
                <!-- Calendar Picker Trigger Button -->
                <button class="btn-mini" id="cal-select-btn" style="display:none;" title="Select Date"><i class="fa-solid fa-calendar-plus"></i></button>
                <button class="btn-mini" onclick="clearInput()"><i class="fa-solid fa-trash"></i></button>
            </div>
        </div>

        <!-- IRCTC Style Middle Exchange Layout -->
        <div class="middle-divider-row">
            <div class="arrow-divider-line">
                <i class="fa-solid fa-angle-down"></i>
                <i class="fa-solid fa-angle-down"></i>
            </div>
            <button class="btn-exchange-mid" id="mid-exch-btn" onclick="toggleMode()" title="Switch Mode">
                <i class="fa-solid fa-arrows-rotate"></i>
            </button>
        </div>

        <div class="result-display">
            <span id="result-text">--</span>
            <button class="copy-btn" onclick="copyResult()"><i class="fa-regular fa-copy"></i></button>
        </div>
    </div>

    <!-- Notepad Card -->
    <div class="card">
        <div class="card-header">
            <div class="icon-box"><i class="fa-solid fa-note-sticky"></i></div>
            <span>Hisab-Kitab Notepad</span>
        </div>
        <textarea id="notepad" class="notepad-textarea" placeholder="Write your calculations, notes, or days log here..."></textarea>
        <button class="btn-wide" onclick="copyNotepad()"><i class="fa-solid fa-copy"></i> Copy All Text</button>
    </div>

    <!-- Calculator Card -->
    <div class="card">
        <div class="card-header">
            <div class="icon-box"><i class="fa-solid fa-calculator"></i></div>
            <span>Basic Calculator</span>
        </div>
        <input type="text" id="calc-display" class="calc-screen" readonly placeholder="0">
        <div class="calc-grid">
            <button class="btn-calc btn-op" onclick="clearCalc()">C</button>
            <button class="btn-calc btn-op" onclick="pressCalc('/')">/</button>
            <button class="btn-calc btn-op" onclick="pressCalc('*')">*</button>
            <button class="btn-calc btn-op" onclick="pressCalc('-')">-</button>
            
            <button class="btn-calc" onclick="pressCalc('7')">7</button>
            <button class="btn-calc" onclick="pressCalc('8')">8</button>
            <button class="btn-calc" onclick="pressCalc('9')">9</button>
            <button class="btn-calc btn-op" onclick="pressCalc('+')">+</button>
            
            <button class="btn-calc" onclick="pressCalc('4')">4</button>
            <button class="btn-calc" onclick="pressCalc('5')">5</button>
            <button class="btn-calc" onclick="pressCalc('6')">6</button>
            <button class="btn-calc btn-op" style="grid-row: span 2; height: 100%;" onclick="calculateResult()">=</button>
            
            <button class="btn-calc" onclick="pressCalc('1')">1</button>
            <button class="btn-calc" onclick="pressCalc('2')">2</button>
            <button class="btn-calc" onclick="pressCalc('3')">3</button>
            
            <button class="btn-calc" style="grid-column: span 2;" onclick="pressCalc('0')">0</button>
            <button class="btn-calc" onclick="pressCalc('.')">.</button>
        </div>
    </div>

    <div class="footer-text">DESIGNED BY NOOR ALAM</div>

    <script>
        let currentMode = "daysToDate"; 

        // 1. Live Clock Logic
        function updateLiveClock() {
            const now = new Date();
            const options = { year: 'numeric', month: '2-digit', day: '2-digit' };
            const dateStr = now.toLocaleDateString('en-GB', options);
            const dayNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            const dayStr = dayNames[now.getDay()];

            document.getElementById('live-date-info').innerText = `${dateStr} | ${dayStr}`;

            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();
            const ampm = hours >= 12 ? 'PM' : 'AM';

            hours = hours % 12;
            hours = hours ? hours : 12; 
            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;
            hours = hours < 10 ? '0' + hours : hours;

            document.getElementById('live-time').innerText = `${hours}:${minutes}:${seconds} ${ampm}`;
        }
        setInterval(updateLiveClock, 1000);
        updateLiveClock();

        // 2. Toggle Mode Logic (IRCTC Style Center Switch)
        function toggleMode() {
            const inputField = document.getElementById('day-input');
            const modeTitle = document.getElementById('card-mode-title');
            const exchIcon = document.querySelector('#mid-exch-btn i');
            const calBtn = document.getElementById('cal-select-btn');
            const hiddenPicker = document.getElementById('native-date-trigger');
            
            exchIcon.classList.toggle('rotate-effect');
            clearInput();

            if (currentMode === "daysToDate") {
                currentMode = "dateToDays";
                inputField.placeholder = "DD-MM-YYYY or pick date...";
                modeTitle.innerText = "Find Days from Today (Type/Pick Date)";
                calBtn.style.display = "flex";
                hiddenPicker.style.display = "block";
            } else {
                currentMode = "daysToDate";
                inputField.placeholder = "Type number with + or - ...";
                modeTitle.innerText = "Find Date (e.g., +5 or -4)";
                calBtn.style.display = "none";
                hiddenPicker.style.display = "none";
            }
        }

        // Handle Date from Native Calendar Selection Box
        function handleDateSelect(dateVal) {
            if (!dateVal) return;
            const [year, month, day] = dateVal.split('-');
            const formattedDate = `${day}-${month}-${year}`;
            document.getElementById('day-input').value = formattedDate;
            calculateTracker(formattedDate);
        }

        // Main Calculation Engine (Supports Typing and Selection)
        document.getElementById('day-input').addEventListener('input', function(e) {
            calculateTracker(e.target.value.trim());
        });

        function calculateTracker(val) {
            const resultSpan = document.getElementById('result-text');

            if (!val) {
                resultSpan.innerText = "--";
                return;
            }

            if (currentMode === "daysToDate") {
                if (!val.startsWith('+') && !val.startsWith('-')) {
                    resultSpan.innerText = "Use + or - prefix";
                    return;
                }
                const daysOffset = parseInt(val);
                if (isNaN(daysOffset)) {
                    resultSpan.innerText = "Invalid number";
                    return;
                }
                const targetDate = new Date();
                targetDate.setDate(targetDate.getDate() + daysOffset);

                const options = { year: 'numeric', month: '2-digit', day: '2-digit' };
                const finalDateStr = targetDate.toLocaleDateString('en-GB', options);
                const dayNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
                resultSpan.innerText = `${finalDateStr} | ${dayNames[targetDate.getDay()]}`;

            } else {
                // Parse DD-MM-YYYY typing format safely
                let parsedDate = null;
                const dateParts = val.split(/[-/.]/);
                
                if (dateParts.length === 3) {
                    const day = parseInt(dateParts[0]);
                    const month = parseInt(dateParts[1]) - 1;
                    let year = parseInt(dateParts[2]);
                    if (year < 100) year += 2000; // Handle shortcut years
                    
                    const testDate = new Date(year, month, day);
                    if (testDate.getDate() === day && testDate.getMonth() === month && testDate.getFullYear() === year) {
                        parsedDate = testDate;
                    }
                }

                if (!parsedDate) {
                    resultSpan.innerText = "Type valid DD-MM-YYYY";
                    return;
                }

                const today = new Date();
                today.setHours(0,0,0,0);
                parsedDate.setHours(0,0,0,0);

                const timeDiff = parsedDate.getTime() - today.getTime();
                const diffDays = Math.round(timeDiff / (1000 * 60 * 60 * 24));

                if (diffDays === 0) {
                    resultSpan.innerText = "Today (0 Days)";
                } else if (diffDays > 0) {
                    resultSpan.innerText = `${diffDays} Days Later (🎯 After)`;
                } else {
                    resultSpan.innerText = `${Math.abs(diffDays)} Days Ago (⏳ Before)`;
                }
            }
        }

        function clearInput() {
            document.getElementById('day-input').value = "";
            document.getElementById('native-date-trigger').value = "";
            document.getElementById('result-text').innerText = "--";
        }

        function copyResult() {
            const textToCopy = document.getElementById('result-text').innerText;
            if (textToCopy && textToCopy !== "--" && !textToCopy.includes("Type") && !textToCopy.includes("Use")) {
                navigator.clipboard.writeText(textToCopy);
                alert("Result copied! 👍");
            }
        }

        // 3. Notepad Logic
        function copyNotepad() {
            const notepadText = document.getElementById('notepad').value;
            if (notepadText.trim()) {
                navigator.clipboard.writeText(notepadText);
                alert("All note text copied successfully! 📝");
            } else {
                alert("Notepad is empty!");
            }
        }

        // 4. Basic Calculator Logic
        const calcDisplay = document.getElementById('calc-display');
        function pressCalc(num) {
            if (calcDisplay.value === "Error") calcDispl
