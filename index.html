<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noor Alam Date Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f4f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 20px;
            color: #2d4030;
        }

        .header-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-bottom: 25px;
            margin-top: 10px;
            width: 100%;
        }

        .text-logo {
            width: 75px;
            height: 75px;
            background: #0b3c26;
            color: #ffffff;
            font-size: 46px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            margin-bottom: 15px;
            box-shadow: 0px 5px 15px rgba(11, 60, 38, 0.25);
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .title {
            font-size: 24px;
            color: #0b3c26;
            font-weight: 700;
        }

        .subtitle {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }

        .card {
            background: #f0f4f8;
            border-radius: 25px;
            box-shadow: 9px 9px 16px #d1d9e6, -9px -9px 16px #ffffff;
            width: 100%;
            max-width: 380px;
            padding: 25px;
            margin-bottom: 25px;
            position: relative;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 16px;
            color: #333;
            margin-bottom: 20px;
        }

        .icon-box {
            background: #ffffff;
            padding: 8px 12px;
            border-radius: 10px;
            box-shadow: 3px 3px 6px #d1d9e6, -3px -3px 6px #ffffff;
            font-weight: bold;
        }

        .live-info-line1 {
            font-size: 18px;
            font-weight: 600;
            color: #1a3020;
            margin-bottom: 8px;
        }

        .live-info-line2 {
            font-size: 26px;
            font-weight: 700;
            color: #2b5c43;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }

        .num-input {
            width: 100%;
            background: #f0f4f8;
            border: none;
            border-bottom: 2px solid #d1d9e6;
            padding: 10px 100px 10px 5px; /* Added right padding for buttons */
            font-size: 17px;
            color: #333;
            outline: none;
            transition: border-color 0.3s;
        }

        .num-input:focus {
            border-bottom-color: #2b5c43;
        }

        .num-input::placeholder {
            color: #999;
            font-size: 14px;
        }

        .action-buttons {
            position: absolute;
            right: 0;
            top: 5px;
            display: flex;
            gap: 8px;
        }

        .btn-mini {
            background: #f0f4f8;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            box-shadow: 3px 3px 6px #d1d9e6, -3px -3px 6px #ffffff;
            cursor: pointer;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-mini:active {
            box-shadow: inset 2px 2px 5px #d1d9e6, inset -2px -2px 5px #ffffff;
        }

        /* IRCTC Style Exchange Button Effect */
        .btn-exchange {
            color: #2b5c43;
            font-weight: bold;
        }
        
        .rotate-effect {
            transform: rotate(180deg);
            transition: transform 0.3s ease;
        }

        .arrow-divider {
            text-align: center;
            color: #d1d9e6;
            margin: 10px 0;
            font-size: 14px;
        }

        .result-display {
            font-size: 19px;
            font-weight: 600;
            color: #1a3020;
            min-height: 40px;
            padding-top: 10px;
            border-bottom: 2px solid #2b5c43;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .copy-btn {
            background: transparent;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 18px;
        }

        .footer-text {
            font-size: 12px;
            font-weight: 700;
            color: #4a6355;
            letter-spacing: 1px;
            margin-top: 10px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- Header Section -->
    <div class="header-section">
        <div class="text-logo">C</div>
        <div class="title">Noor Alam 2.06.13123.044</div>
        <div class="subtitle">🌹 #43615.012</div>
    </div>

    <!-- Top Card: Live Calendar & Time -->
    <div class="card">
        <div class="card-header">
            <div class="icon-box"><i class="fa-solid fa-calendar-days"></i></div>
            <span>Today's Calendar</span>
        </div>
        <div class="live-info-line1" id="live-date-info">Loading...</div>
        <div class="live-info-line2" id="live-time">00:00:00 AM</div>
    </div>

    <!-- Bottom Card: Smart Date Calculator -->
    <div class="card">
        <div class="card-header">
            <div class="icon-box"><i class="fa-solid fa-calculator"></i></div>
            <span id="card-mode-title">Find Date (e.g., +5 or -4)</span>
        </div>

        <div class="input-wrapper">
            <!-- Dynamic input that changes placeholder and type based on mode -->
            <input type="text" id="day-input" class="num-input" placeholder="Type number with + or - ...">
            <div class="action-buttons">
                <!-- IRCTC Style Exchange Button -->
                <button class="btn-mini btn-exchange" id="exch-btn" onclick="toggleMode()" title="Switch Mode"><i class="fa-solid fa-arrows-rotate"></i></button>
                <button class="btn-mini" onclick="clearInput()"><i class="fa-solid fa-trash"></i></button>
            </div>
        </div>

        <div class="arrow-divider">
            <i class="fa-solid fa-angle-down"></i><i class="fa-solid fa-angle-down"></i>
        </div>

        <div class="result-display">
            <span id="result-text">--</span>
            <button class="copy-btn" onclick="copyResult()"><i class="fa-regular fa-copy"></i></button>
        </div>
    </div>

    <div class="footer-text">DESIGNED BY NOOR ALAM</div>

    <script>
        let currentMode = "daysToDate"; // Modes: "daysToDate" or "dateToDays"

        function updateLiveClock() {
            const now = new Date();
            const options = { year: 'numeric', month: '2-digit', day: '2-digit' };
            const dateStr = now.toLocaleDateString('en-GB', options);
            const dayNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            const dayStr = dayNames[now.getDay()];

            document.getElementById('live-date-info').innerText = `${dateStr} | ${dayStr}`;

            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();
            const ampm = hours >= 12 ? 'PM' : 'AM';

            hours = hours % 12;
            hours = hours ? hours : 12; 
            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;
            hours = hours < 10 ? '0' + hours : hours;

            document.getElementById('live-time').innerText = `${hours}:${minutes}:${seconds} ${ampm}`;
        }

        setInterval(updateLiveClock, 1000);
        updateLiveClock();

        // Toggle Calculator Mode (IRCTC Style Exchange)
        function toggleMode() {
            const inputField = document.getElementById('day-input');
            const modeTitle = document.getElementById('card-mode-title');
            const exchIcon = document.querySelector('#exch-btn i');
            
            // Spin animation like IRCTC
            exchIcon.classList.toggle('rotate-effect');
            
            clearInput();

            if (currentMode === "daysToDate") {
                currentMode = "dateToDays";
                inputField.type = "date"; // Changes to calendar picker on click/tap
                inputField.placeholder = ""; 
                modeTitle.innerText = "Find Days from Today (Select Date)";
            } else {
                currentMode = "daysToDate";
                inputField.type = "text";
                inputField.placeholder = "Type number with + or - ...";
                modeTitle.innerText = "Find Date (e.g., +5 or -4)";
            }
        }

        // Live calculation logic
        document.getElementById('day-input').addEventListener('input', function(e) {
            const val = e.target.value.trim();
            const resultSpan = document.getElementById('result-text');

            if (!val) {
                resultSpan.innerText = "--";
                return;
            }

            if (currentMode === "daysToDate") {
                // Mode 1: Number to Date (+5 / -4)
                if (!val.startsWith('+') && !val.startsWith('-')) {
                    resultSpan.innerText = "Use + or - prefix";
                    return;
                }

                const daysOffset = parseInt(val);
                if (isNaN(daysOffset)) {
                    resultSpan.innerText = "Invalid number";
                    return;
                }

                const targetDate = new Date();
                targetDate.setDate(targetDate.getDate() + daysOffset);

                const options = { year: 'numeric', month: '2-digit', day: '2-digit' };
                const finalDateStr = targetDate.toLocaleDateString('en-GB', options);
                const dayNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
                const finalDayStr = dayNames[targetDate.getDay()];

                resultSpan.innerText = `${finalDateStr} | ${finalDayStr}`;

            } else {
                // Mode 2: Date to Days Difference
                const inputDate = new Date(val);
                if (isNaN(inputDate.getTime())) {
                    resultSpan.innerText = "Invalid Date";
                    return;
                }

                // Reset time to compare only dates
                const today = new Date();
                today.setHours(0,0,0,0);
                inputDate.setHours(0,0,0,0);

                const timeDiff = inputDate.getTime() - today.getTime();
                const diffDays = Math.round(timeDiff / (1000 * 60 * 60 * 24));

                if (diffDays === 0) {
                    resultSpan.innerText = "Today (0 Days)";
                } else if (diffDays > 0) {
                    resultSpan.innerText = `${diffDays} Days Later (🎯 After)`;
                } else {
                    resultSpan.innerText = `${Math.abs(diffDays)} Days Ago (⏳ Before)`;
                }
            }
        });

        function clearInput() {
            document.getElementById('day-input').value = "";
            document.getElementById('result-text').innerText = "--";
        }

        function copyResult() {
            const textToCopy = document.getElementById('result-text').innerText;
            if (textToCopy && textToCopy !== "--") {
                navigator.clipboard.writeText(textToCopy);
                alert("Result copied successfully! 👍");
            }
        }
    </script>
</body>
</html>
