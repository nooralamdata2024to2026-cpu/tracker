<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Ultimate Chat Decoder</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', -apple-system, sans-serif; }
        body { background-color: #d1d5db; min-height: 100vh; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        .chat-frame { 
            width: 100%; 
            max-width: 600px; 
            height: 88vh; 
            background-color: #efeae2; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            border: 1px solid #bbb; 
        }
        
        .chat-header { 
            background: #075e54; 
            color: white; 
            padding: 14px 18px; 
            font-size: 18px; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            position: sticky; 
            top: 0; 
            z-index: 100; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.15); 
        }
        .header-left { display: flex; align-items: center; gap: 12px; max-width: 80%; }
        #chat-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .btn-delete { color: #ff6b6b; cursor: pointer; padding: 5px; transition: transform 0.1s ease, opacity 0.1s; }
        .btn-delete:active { transform: scale(0.8); opacity: 0.7; }
        
        .chat-body { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            scroll-behavior: smooth; 
        }
        
        .msg { max-width: 85%; padding: 8px 14px 22px 14px; border-radius: 8px; font-size: 14.5px; position: relative; line-height: 1.4; word-wrap: break-word; box-shadow: 0 1px 2px rgba(0,0,0,0.12); display: block; color: #000000 !important; white-space: pre-wrap; }
        .msg.incoming { background: #ffffff !important; align-self: flex-start; border-top-left-radius: 0; }
        .msg.outgoing { background: #e7ffdb !important; align-self: flex-end; border-top-right-radius: 0; }
        
        .sender-name { font-size: 11px; font-weight: bold; color: #35a661 !important; margin-bottom: 3px; display: block; }
        .msg.outgoing .sender-name { color: #4f772d !important; }
        .msg-time { font-size: 9.5px; color: #666666 !important; position: absolute; bottom: 4px; right: 10px; white-space: nowrap; }
        .system-msg { background: #e1f3fb !important; color: #4a4a4a !important; font-size: 12px; padding: 6px 14px; border-radius: 7px; align-self: center; text-align: center; margin: 5px 0; max-width: 92%; line-height: 1.3; box-shadow: 0 1px 1px rgba(0,0,0,0.05); }

        .bottom-controls { width: 100%; max-width: 600px; padding: 12px 5px; text-align: center; }
        .status-loading { color: #4b5563; font-size: 13.5px; font-weight: bold; margin-bottom: 8px; }
        
        .btn-group { display: flex; gap: 12px; justify-content: center; width: 100%; }
        
        .btn { 
            border: none; 
            padding: 14px 15px; 
            font-size: 15px; 
            font-weight: bold; 
            border-radius: 14px; 
            cursor: pointer; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            color: white; 
            flex: 1; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn:active { transform: scale(0.93); }
        .btn-pdf { background: linear-gradient(135deg, #00b4db, #0083b0); }
        .btn-zip { background: linear-gradient(135deg, #11998e, #38ef7d); }
        
        #file-input { display: none; }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.76);
            display: none; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: white;
            font-size: 16px;
            font-weight: bold;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            border-top-color: #34a853; 
            animation: spin 0.8s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media print {
            body, html { background: #efeae2 !important; padding: 0 !important; height: auto !important; min-height: auto !important; }
            .bottom-controls, .loading-overlay { display: none !important; } 
            .chat-frame { 
                width: 100% !important; 
                max-width: 100% !important; 
                height: auto !important; 
                overflow: visible !important; 
                border: none !important; 
                box-shadow: none !important; 
                border-radius: 0 !important;
                background-color: #efeae2 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .chat-body { overflow: visible !important; height: auto !important; max-height: none !important; display: flex !important; flex-direction: column !important; padding: 15px !important; }
            .chat-header { position: relative !important; background: #075e54 !important; color: white !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .btn-delete { display: none !important; }
            .msg { page-break-inside: avoid !important; break-inside: avoid !important; display: block !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .msg.incoming { background: #ffffff !important; color: #000000 !important; }
            .msg.outgoing { background: #e7ffdb !important; color: #000000 !important; }
            .system-msg { background: #e1f3fb !important; color: #4a4a4a !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loading-screen">
        <div class="spinner"></div>
        <div id="loading-text">Please wait, preparing PDF...</div>
    </div>

    <div class="chat-frame" id="chat-frame-box">
        <div class="chat-header">
            <div class="header-left">
                <i class="fa-solid fa-user-circle fa-xl"></i> 
                <span id="chat-title">WhatsApp Chat</span>
            </div>
            <div class="btn-delete" onclick="resetChatData()" title="Clear Chat Data">
                <i class="fa-solid fa-trash-can fa-lg"></i>
            </div>
        </div>
        <div class="chat-body" id="chat-container">
            <div class="system-msg" id="empty-state">Please select a .zip or .txt file using the 'Add Chat File' button below to load conversation.</div>
        </div>
    </div>

    <div class="bottom-controls">
        <div id="status" class="status-loading">No file selected</div>
        <div class="btn-group">
            <button class="btn btn-pdf" onclick="downloadPrintPDF()"><i class="fa-solid fa-file-pdf"></i> Save in PDF</button>
            <button class="btn btn-zip" onclick="document.getElementById('file-input').click()"><i class="fa-solid fa-file-zipper"></i> Add Chat File</button>
            <input type="file" id="file-input" accept=".zip,text/plain,application/zip" onchange="handleUploadedFile(this)">
        </div>
    </div>

    <script>
        let hasData = false;

        function handleUploadedFile(input) {
            const file = input.files[0];
            if (!file) return;

            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "Scanning file...";
            statusDiv.style.color = "#075e54";

            const reader = new FileReader();

            if (file.name.toLowerCase().endsWith('.txt')) {
                reader.onload = function(e) {
                    hasData = true;
                    statusDiv.innerText = "Chat loaded successfully! 👍";
                    parseAndDisplayChat(e.target.result);
                };
                reader.readAsText(file);
            } else {
                reader.onload = function(e) {
                    const arrayBuffer = e.target.result;
                    JSZip.loadAsync(arrayBuffer).then(function(zip) {
                        let chatFileKey = Object.keys(zip.files).find(name => name.toLowerCase().endsWith('.txt'));
                        if (!chatFileKey) throw new Error("No .txt file found inside zip container!");
                        return zip.file(chatFileKey).async("string");
                    })
                    .then(function(rawText) {
                        hasData = true;
                        statusDiv.innerText = "Zip chat loaded successfully! 👍";
                        parseAndDisplayChat(rawText);
                    })
                    .catch(function(err) {
                        statusDiv.innerText = "Error: " + err.message;
                        statusDiv.style.color = "red";
                    });
                };
                reader.readAsArrayBuffer(file);
            }
        }

        function parseAndDisplayChat(rawText) {
            const container = document.getElementById('chat-container');
            container.innerHTML = ""; 
            
            // Universal Chat Splitter (Handles multiple timestamp structures seamlessly)
            const lines = rawText.split(/\r?\n/);
            let chatPartnerName = "WhatsApp Chat"; 

            lines.forEach(line => {
                if (!line.trim()) return;
                
                // Super Regex matching both [3/7/26, 5:30 PM] and 3/7/26, 5:30 PM formats
                const match = line.match(/^\[?(\d{1,4}\/\d{1,2}\/\d{1,4}),?\s+(\d{1,2}:\d{2}(?::\d{2})?\s*[A-Za-z]*)\]?\s*-\s*([^:]+):\s*(.*)$/) ||
                              line.match(/^\[?(\d{1,4}\/\d{1,2}\/\d{1,4}),?\s+(\d{1,2}:\d{2}(?::\d{2})?\s*[A-Za-z]*)\]?\s+([^:]+):\s*(.*)$/);

                if (match) {
                    let date = match[1];
                    let time = match[2];
                    let sender = match[3].trim();
                    let message = match[4].trim();
                    
                    const senderLower = sender.toLowerCase();
                    const isOutgoing = senderLower.includes("noor") || senderLower.includes("alam");

                    if (!isOutgoing && chatPartnerName === "WhatsApp Chat") {
                        chatPartnerName = sender; 
                    }
                    
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `msg ${isOutgoing ? 'outgoing' : 'incoming'}`;
                    msgDiv.innerHTML = `<span class="sender-name">${sender}</span>${message}<span class="msg-time">${time}</span>`;
                    container.appendChild(msgDiv);
                } else {
                    // System messages check
                    if (line.includes("encrypted") || line.includes("changed number") || line.includes("deleted") || line.includes("omitted")) {
                        const sysDiv = document.createElement('div'); 
                        sysDiv.className = 'system-msg'; 
                        sysDiv.innerText = line;
                        container.appendChild(sysDiv);
                    } else {
                        // Multi-line message continuation support
                        const lastMsg = container.lastChild;
                        if (lastMsg && lastMsg.classList.contains('msg')) {
                            const timeSpan = lastMsg.querySelector('.msg-time');
                            // Append line break text safely before time stamp element
                            const textNode = document.createTextNode("\n" + line);
                            lastMsg.insertBefore(textNode, timeSpan);
                        }
                    }
                }
            });
            
            document.getElementById('chat-title').innerText = chatPartnerName;
            setTimeout(() => { container.scrollTop = container.scrollHeight; }, 200);
        }

        function resetChatData() {
            document.getElementById('chat-container').innerHTML = `<div class="system-msg">Please select a .zip or .txt file using the 'Add Chat File' button below to load conversation.</div>`;
            document.getElementById('chat-title').innerText = "WhatsApp Chat";
            document.getElementById('status').innerText = "Data cleared. Ready for new file selection.";
            document.getElementById('status').style.color = "#4b5563";
            document.getElementById('file-input').value = ""; 
            hasData = false;
        }

        function downloadPrintPDF() {
            const statusDiv = document.getElementById('status');
            const loader = document.getElementById('loading-screen');
            
            if(!hasData) {
                statusDiv.innerText = "Please upload a chat file first!";
                statusDiv.style.color = "red";
                return;
            }
            
            loader.style.display = "flex";
            setTimeout(() => {
                window.print();
                loader.style.display = "none";
                statusDiv.innerText = "PDF converter dialog opened. 👍";
                statusDiv.style.color = "#11998e";
            }, 1000);
        }
    </script>
</body>
</html>
