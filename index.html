<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noor Alam Dashboard</title>
    <!-- FontAwesome CSS Icons के लिए -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background-color: #0b0f19;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 20px;
            color: #ffffff;
            font-family: sans-serif;
        }

        .header-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-bottom: 25px;
            margin-top: 10px;
            width: 100%;
        }

        /* Fixed Logo back to classic "C" */
        .text-logo {
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, #a855f7, #06b6d4);
            color: #ffffff;
            font-size: 32px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-bottom: 15px;
            box-shadow: 0px 0px 20px rgba(168, 85, 247, 0.4);
        }

        .title {
            font-size: 24px;
            background: linear-gradient(to right, #a855f7, #06b6d4, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .subtitle {
            font-size: 14px;
            color: #94a3b8;
            margin-top: 5px;
        }

        .card {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 24px;
            width: 100%;
            max-width: 380px;
            padding: 22px;
            margin-bottom: 22px;
            position: relative;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 16px;
            color: #f1f5f9;
            margin-bottom: 20px;
        }

        .icon-box {
            background: rgba(168, 85, 247, 0.15);
            color: #c084fc;
            padding: 8px 12px;
            border-radius: 12px;
            font-weight: bold;
        }

        .live-info-line1 {
            font-size: 16px;
            font-weight: 500;
            color: #94a3b8;
            margin-bottom: 6px;
        }

        .live-info-line2 {
            font-size: 32px;
            font-weight: 700;
            color: #06b6d4;
            text-shadow: 0 0 12px rgba(6, 182, 212, 0.4);
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }

        .num-input {
            width: 100%;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 12px;
            padding: 12px 45px 12px 12px;
            font-size: 16px;
            color: #ffffff;
            outline: none;
        }

        .num-input:focus {
            border-color: #06b6d4;
            box-shadow: 0 0 0 2px rgba(6, 182, 212, 0.2);
        }

        .action-buttons {
            position: absolute;
            right: 10px;
            top: 12px;
            display: flex;
            gap: 8px;
        }

        .btn-mini {
            background: #374151;
            border: none;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            cursor: pointer;
            color: #94a3b8;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* IRCTC Style Vertical Double Arrow (Up & Down) */
        .middle-divider-row {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 12px 0;
            position: relative;
            height: 20px;
        }

        .btn-exchange-mid {
            background: linear-gradient(135deg, #a855f7, #3b82f6);
            color: #ffffff;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
            font-size: 16px;
        }

        .result-display {
            font-size: 18px;
            font-weight: 600;
            color: #f1f5f9;
            min-height: 45px;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border-left: 3px solid #a855f7;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .copy-btn {
            background: transparent;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 18px;
        }

        /* Notepad Section - BIG SIZE */
        .notepad-textarea {
            width: 100%;
            height: 320px;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 16px;
            padding: 14px;
            font-size: 15px;
            color: #ffffff;
            resize: none;
            outline: none;
            margin-bottom: 15px;
        }

        .btn-wide {
            width: 100%;
            background: linear-gradient(to right, #a855f7, #6366f1);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(168, 85, 247, 0.3);
        }

        /* Calculator Design */
        .calc-screen {
            width: 100%;
            height: 55px;
            background: #1f2937;
            border-radius: 14px;
            border: 1px solid #374151;
            text-align: right;
            padding: 12px;
            font-size: 24px;
            color: #ffffff;
            margin-bottom: 15px;
            font-weight: 600;
            outline: none;
        }

        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .btn-calc {
            background: #1f2937;
            border: 1px solid #374151;
            padding: 16px 0;
            font-size: 18px;
            font-weight: 600;
            color: #f1f5f9;
            border-radius: 14px;
            cursor: pointer;
        }

        .btn-op {
            color: #06b6d4;
            background: rgba(6, 182, 212, 0.08);
            border-color: rgba(6, 182, 212, 0.2);
        }

        .btn-equal {
            background: linear-gradient(to bottom, #06b6d4, #3b82f6);
            color: #ffffff;
            border: none;
        }

        .footer-text {
            font-size: 11px;
            font-weight: 700;
            color: #64748b;
            letter-spacing: 1.5px;
            margin-top: 10px;
            margin-bottom: 25px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="header-section">
        <div class="text-logo">C</div>
        <div class="title">Noor Alam 2.06.13123.044</div>
        <div class="subtitle">🌹 #43615.012</div>
    </div>

    <div class="card">
        <div class="card-header">
            <div class="icon-box"><i class="fa-solid fa-calendar-days"></i></div>
            <span>Today's Calendar</span>
        </div>
        <div class="live-info-line1" id="live-date-info">Loading...</div>
        <div class="live-info-line2" id="live-time">00:00:00 AM</div>
    </div>

    <div class="card">
        <div class="card-header">
            <div class="icon-box"><i class="fa-solid fa-calculator"></i></div>
            <span id="card-mode-title">Find Date (e.g., +5 or -4)</span>
        </div>

        <div class="input-wrapper">
            <input type="text" id="day-input" class="num-input" placeholder="Type number with + or - ...">
            <div class="action-buttons">
                <button class="btn-mini" onclick="clearInput()"><i class="fa-solid fa-trash"></i></button>
            </div>
        </div>

        <div class="middle-divider-row">
            <button class="btn-exchange-mid" onclick="toggleMode()" title="Switch Mode">
                <i class="fa-solid fa-arrows-up-down"></i>
            </button>
        </div>

        <div class="result-display">
            <span id="result-text">--</span>
            <button class="copy-btn" onclick="copyResult()"><i class="fa-regular fa-copy"></i></button>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <div class="icon-box"><i class="fa-solid fa-note-sticky"></i></div>
            <span>Hisab-Kitab Notepad</span>
        </div>
        <textarea id="notepad" class="notepad-textarea" placeholder="Write your calculations, notes, or days log here..."></textarea>
        <button class="btn-wide" onclick="copyNotepad()"><i class="fa-solid fa-copy"></i> Copy All Text</button>
    </div>

    <div class="card">
        <div class="card-header">
            <div class="icon-box"><i class="fa-solid fa-calculator"></i></div>
            <span>Basic Calculator</span>
        </div>
        <input type="text" id="calc-display" class="calc-screen" readonly placeholder="0">
        <div class="calc-grid">
            <button class="btn-calc btn-op" style="color: #ef4444;" onclick="clearCalc()">C</button>
            <button class="btn-calc btn-op" onclick="pressCalc('÷')">÷</button>
            <button class="btn-calc btn-op" onclick="pressCalc('×')">×</button>
            <button class="btn-calc btn-op" onclick="pressCalc('-')">-</button>
            
            <button class="btn-calc" onclick="pressCalc('7')">7</button>
            <button class="btn-calc" onclick="pressCalc('8')">8</button>
            <button class="btn-calc" onclick="pressCalc('9')">9</button>
            <button class="btn-calc btn-op" onclick="pressCalc('+')">+</button>
            
            <button class="btn-calc" onclick="pressCalc('4')">4</button>
            <button class="btn-calc" onclick="pressCalc('5')">5</button>
            <button class="btn-calc" onclick="pressCalc('6')">6</button>
            <button class="btn-calc btn-equal" style="grid-row: span 2; height: 100%;" onclick="calculateResult()">=</button>
            
            <button class="btn-calc" onclick="pressCalc('1')">1</button>
            <button class="btn-calc" onclick="pressCalc('2')">2</button>
            <button class="btn-calc" onclick="pressCalc('3')">3</button>
            
            <button class="btn-calc" style="grid-column: span 2;" onclick="pressCalc('0')">0</button>
            <button class="btn-calc" onclick="pressCalc('.')">.</button>
        </div>
    </div>

    <div class="footer-text">DESIGNED WITH ❤️ BY NOOR ALAM</div>

    <script>
        let currentMode = "daysToDate";
        let calcValue = ""; 

        // 1. Safe Digital Clock
        function updateLiveClock() {
            const now = new Date();
            const options = { year: 'numeric', month: '2-digit', day: '2-digit' };
            const dateStr = now.toLocaleDateString('en-GB', options);
            const dayNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            
            document.getElementById('live-date-info').innerText = `${dateStr} | ${dayNames[now.getDay()]}`;

            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();
            const ampm = hours >= 12 ? 'PM' : 'AM';

            hours = hours % 12;
            hours = hours ? hours : 12; 
            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;
            hours = hours < 10 ? '0' + hours : hours;

            document.getElementById('live-time').innerText = `${hours}:${minutes}:${seconds} ${ampm}`;
        }
        setInterval(updateLiveClock, 1000);
        updateLiveClock();

        // 2. Pure Mode Switch
        function toggleMode() {
            const inputField = document.getElementById('day-input');
            const modeTitle = document.getElementById('card-mode-title');
            clearInput();

            if (currentMode === "daysToDate") {
                currentMode = "dateToDays";
                inputField.placeholder = "Type date as DD-MM-YYYY ...";
                modeTitle.innerText = "Find Days from Today (Type Date)";
            } else {
                currentMode = "daysToDate";
                inputField.placeholder = "Type number with + or - ...";
                modeTitle.innerText = "Find Date (e.g., +5 or -4)";
            }
        }

        // Freeze-Proof Date Calculations
        document.getElementById('day-input').addEventListener('input', function(e) {
            const val = e.target.value.trim();
            const resultSpan = document.getElementById('result-text');

            if (!val) {
                resultSpan.innerText = "--";
                return;
            }

            if (currentMode === "daysToDate") {
                if (!val.startsWith('+') && !val.startsWith('-')) {
                    resultSpan.innerText = "Use + or - prefix";
                    return;
                }
                const daysOffset = parseInt(val);
                if (isNaN(daysOffset)) {
                    resultSpan.innerText = "Invalid number";
                    return;
                }
                const targetDate = new Date();
                targetDate.setDate(targetDate.getDate() + daysOffset);

                const options = { year: 'numeric', month: '2-digit', day: '2-digit' };
                const finalDateStr = targetDate.toLocaleDateString('en-GB', options);
                const dayNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
                resultSpan.innerText = `${finalDateStr} | ${dayNames[targetDate.getDay()]}`;

            } else {
                let parsedDate = null;
                const dateParts = val.split(/[-/.]/);
                
                if (dateParts.length === 3) {
                    const day = parseInt(dateParts[0]);
                    const month = parseInt(dateParts[1]) - 1;
                    let year = parseInt(dateParts[2]);
                    if (year < 100) year += 2000; 
                    
                    const testDate = new Date(year, month, day);
                    if (testDate.getDate() === day && testDate.getMonth() === month && testDate.getFullYear() === year) {
                        parsedDate = testDate;
                    }
                }

                if (!parsedDate) {
                    resultSpan.innerText = "Format: DD-MM-YYYY";
                    return;
                }

                const today = new Date();
                today.setHours(0,0,0,0);
                parsedDate.setHours(0,0,0,0);

                const timeDiff = parsedDate.getTime() - today.getTime();
                const diffDays = Math.round(timeDiff / (1000 * 60 * 60 * 24));

                if (diffDays === 0) {
                    resultSpan.innerText = "Today (0 Days)";
                } else if (diffDays > 0) {
                    resultSpan.innerText = `${diffDays} Days Later (🎯 After)`;
                } else {
                    resultSpan.innerText = `${Math.abs(diffDays)} Days Ago (⏳ Before)`;
                }
            }
        });

        function clearInput() {
            document.getElementById('day-input').value = "";
            document.getElementById('result-text').innerText = "--";
        }

        function copyResult() {
            const textToCopy = document.getElementById('result-text').innerText;
            if (textToCopy && textToCopy !== "--" && !textToCopy.includes("Format") && !textToCopy.includes("Use")) {
                navigator.clipboard.writeText(textToCopy);
                alert("Result copied! 👍");
            }
        }

        function copyNotepad() {
            const notepadText = document.getElementById('notepad').value;
            if (notepadText.trim()) {
                navigator.clipboard.writeText(notepadText);
                alert("All note text copied successfully! 📝");
            } else {
                alert("Notepad is empty!");
            }
        }

        // 3. Freeze-Proof Safe Calculator Engine (No eval used!)
        const calcDisplay = document.getElementById('calc-display');
        
        function pressCalc(char) {
            if (calcDisplay.value === "Error") clearCalc();
            
            if (char === '×' || char === '÷' || char === '+' || char === '-') {
                // Prevent duplicate continuous operators
                const lastChar = calcValue.slice(-1);
                if (['+', '-', '*', '/'].includes(lastChar)) {
                    calcValue = calcValue.slice(0, -1);
                    calcDisplay.value = calcDisplay.value.slice(0, -1);
                }
                
                if (char === '×') calcValue += '*';
                else if (char === '÷') calcValue += '/';
                else calcValue += char;
                
                calcDisplay.value += char;
            } else {
                calcValue += char;
                calcDisplay.value += char;
            }
        }

        function clearCalc() {
            calcDisplay.value = "";
            calcValue = "";
        }

        function calculateResult() {
            try {
                if (!calcValue.trim()) return;
                // Safe calculation pattern matching
                const result = new Function(`return ${calcValue}`)();
                if (result === undefined || isNaN(result) || !isFinite(result)) {
                    calcDisplay.value = "Error";
                    calcValue = "";
                } else {
                    calcDisplay.value = result;
                    calcValue = result.toString();
                }
            } catch (err) {
                calcDisplay.value = "Error";
                calcValue = "";
            }
        }
    </script>
</body>
</html>
